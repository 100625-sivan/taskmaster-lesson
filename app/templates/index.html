<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskMaster - Kanban Board</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f4f5f7;
      color: #172b4d;
      min-height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, #5b4dc7 0%, #7c3aed 50%, #6366f1 100%);
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(91, 77, 199, .35);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .header-meta {
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 13px;
    }

    .badge {
      background: rgba(255,255,255,.18);
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: .3px;
    }


    /* ── Board Layout ─────────────────────────────────────── */
    .board {
      display: flex;
      gap: 24px;
      padding: 32px;
      max-width: 960px;
      margin: 0 auto;
    }

    .column {
      flex: 1;
      min-width: 0;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .column-title {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: #6b7280;
    }

    .column-count {
      background: #e5e7eb;
      color: #6b7280;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .column-list {
      background: #ebecf0;
      border-radius: 12px;
      padding: 12px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .column.todo .column-list  { background: #f0eefb; }
    .column.done .column-list  { background: #ecfdf5; }

    /* ── Task Cards ───────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 14px 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      transition: box-shadow .15s, transform .15s;
      cursor: default;
    }

    .card:hover {
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
      transform: translateY(-1px);
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.4;
    }

    .card-id {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 6px;
      font-weight: 500;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    .btn-card-delete {
      background: none;
      border: none;
      color: #d1d5db;
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      border-radius: 4px;
      transition: color .15s;
      line-height: 1;
    }
    .btn-card-delete:hover {
      color: #ef4444;
    }

    .column.done .card {
      opacity: .72;
    }

    .column.done .card-title {
      text-decoration: line-through;
      color: #6b7280;
    }

    .empty-state {
      text-align: center;
      padding: 24px 8px;
      color: #9ca3af;
      font-size: 14px;
      font-style: italic;
    }

    /* ── Add-Task Input Area ──────────────────────────────── */
    .add-task-area {
      padding: 0 32px 32px;
      max-width: 960px;
      margin: 0 auto;
    }

    .add-task-form {
      display: flex;
      gap: 10px;
      background: #fff;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      align-items: center;
    }

    .add-task-form input[type="text"] {
      flex: 1;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }

    .add-task-form input[type="text"]:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, .12);
    }

    .add-task-form input[type="text"]::placeholder {
      color: #b0b0b0;
    }

    .btn-add {
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .15s, transform .1s;
    }

    .btn-add:hover { opacity: .9; }
    .btn-add:active { transform: scale(.97); }
    .btn-add:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Footer ───────────────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #9ca3af;
    }

    .footer code {
      background: #e5e7eb;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
    }

    /* ── Toast Notification ───────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #ef4444;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 640px) {
      .board { flex-direction: column; padding: 16px; gap: 16px; }
      .add-task-area { padding: 0 16px 16px; }
      .header { padding: 12px 16px; flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════  HEADER  ═══════════════════ -->
  <header class="header">
    <div class="header-left">
      <div class="logo">T</div>
      <h1>TaskMaster</h1>
    </div>
    <div class="header-meta">
      <span class="badge">v{{ version }}</span>
    </div>
  </header>

  <!-- ═══════════════════  KANBAN BOARD  ═══════════════════ -->
  <section class="board">

    <!-- To Do Column -->
    <div class="column todo">
      <div class="column-header">
        <span class="column-title">To Do</span>
        <span class="column-count" id="todo-count">0</span>
      </div>
      <div class="column-list" id="todo-list"></div>
    </div>

    <!-- Done Column -->
    <div class="column done">
      <div class="column-header">
        <span class="column-title">Done</span>
        <span class="column-count" id="done-count">0</span>
      </div>
      <div class="column-list" id="done-list"></div>
    </div>

  </section>

  <!-- ═══════════════════  ADD TASK  ═══════════════════ -->
  <div class="add-task-area">
    <form class="add-task-form" id="add-form">
      <input
        type="text"
        id="task-input"
        placeholder="Add a new task..."
        autocomplete="off"
        required
      />
      <button type="submit" class="btn-add" id="btn-add">+ Add Task</button>
    </form>
  </div>

  <!-- ═══════════════════  FOOTER  ═══════════════════ -->
  <footer class="footer">
    TaskMaster
  </footer>

  <!-- Toast for errors -->
  <div class="toast" id="toast"></div>

  <!-- ═══════════════════  JAVASCRIPT  ═══════════════════ -->
  <script>
    // ── Initial task data from Flask (server-rendered) ───────
    const initialTasks = {{ tasks | tojson }};

    // ── DOM refs ────────────────────────────────────────────
    const todoList  = document.getElementById("todo-list");
    const doneList  = document.getElementById("done-list");
    const todoCount = document.getElementById("todo-count");
    const doneCount = document.getElementById("done-count");
    const addForm   = document.getElementById("add-form");
    const taskInput = document.getElementById("task-input");
    const btnAdd    = document.getElementById("btn-add");
    const toast     = document.getElementById("toast");

    // ── Render helpers ──────────────────────────────────────
    function createCard(task) {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = task.id;
      card.innerHTML =
        '<div class="card-title">' + escapeHtml(task.title) + '</div>' +
        '<div class="card-bottom">' +
        '  <span class="card-id">TASK-' + task.id + '</span>' +
        '  <button class="btn-card-delete" onclick="deleteTask(' + task.id + ')" title="Delete">&times;</button>' +
        '</div>';
      return card;
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text;
      return d.innerHTML;
    }

    function renderBoard(tasks) {
      todoList.innerHTML = "";
      doneList.innerHTML = "";

      const todo = tasks.filter(t => !t.done);
      const done = tasks.filter(t =>  t.done);

      if (todo.length === 0) {
        todoList.innerHTML = '<div class="empty-state">No tasks yet</div>';
      } else {
        todo.forEach(t => todoList.appendChild(createCard(t)));
      }

      if (done.length === 0) {
        doneList.innerHTML = '<div class="empty-state">Nothing completed</div>';
      } else {
        done.forEach(t => doneList.appendChild(createCard(t)));
      }

      todoCount.textContent = todo.length;
      doneCount.textContent = done.length;
    }

    // ── Toast helper ────────────────────────────────────────
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("visible");
      setTimeout(() => toast.classList.remove("visible"), 3500);
    }

    // ── Add new task via API ─────────────────────────────────
    addForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = taskInput.value.trim();
      if (!title) return;

      btnAdd.disabled = true;
      btnAdd.textContent = "Adding...";

      try {
        const res = await fetch("/api/tasks", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || "Failed to create task");
        }

        const newTask = await res.json();

        // Add to local list and re-render immediately
        initialTasks.push(newTask);
        renderBoard(initialTasks);
        taskInput.value = "";
        taskInput.focus();
      } catch (err) {
        showToast(err.message);
      } finally {
        btnAdd.disabled = false;
        btnAdd.textContent = "+ Add Task";
      }
    });

    // ── Delete a task via API ───────────────────────────────
    async function deleteTask(id) {
      try {
        const res = await fetch("/api/tasks/" + id, { method: "DELETE" });
        if (!res.ok) throw new Error("Delete failed");
        const idx = initialTasks.findIndex(t => t.id === id);
        if (idx !== -1) initialTasks.splice(idx, 1);
        renderBoard(initialTasks);
      } catch (err) {
        showToast(err.message);
      }
    }

    // ── Initial render ──────────────────────────────────────
    renderBoard(initialTasks);
  </script>

</body>
</html>
